name: Sync Gallery

on:
  push:
    branches: [main]
    paths:
      - 'images/galleries/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run sync script
        run: python .github/scripts/sync_gallery.py .

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create branch, commit, and open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto/gallery-sync-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "auto: sync gallery"
          git push origin "$BRANCH"
          gh pr create \
            --title "auto: sync gallery" \
            --body "Auto-generated by the gallery sync action. Images have been renamed with order prefixes and YML entries appended with default values. Review the diff and update any titles or descriptions directly in the YML before merging." \
            --base main \
            --head "$BRANCH"
